  - type: Features
    data:
      - name: Life Insurance Products
        description: >-
          Comprehensive life insurance portfolio including whole life, universal
          life, term life, key person, critical illness, and buy-sell agreement
          coverage across multiple subsidiaries.
      - name: Annuity Products
        description: >-
          Fixed, indexed, variable, immediate, and deferred annuities for
          retirement accumulation and income through Integrity Life, Lafayette
          Life, and W&S Financial Group Distributors.
      - name: Investment Management
        description: >-
          Institutional and high-net-worth investment management through Fort
          Washington Investment Advisors, and mutual fund offerings through
          Touchstone Investments.
      - name: Digital Insurance Platform
        description: >-
          Columbus Life operates a fully digital platform for faster
          submission-to-commission processing for independent financial
          service representatives.
      - name: Direct-to-Consumer Digital Channel
        description: >-
          Fabric by Gerber Life provides affordable term life insurance,
          will creation, and family financial organization via mobile app
          and digital platform.
      - name: Wholesale Distribution
        description: >-
          W&S Financial Group Distributors serves as a wholesale distributor
          of annuities and life insurance to financial institutions, banks,
          and independent advisors.
      - name: Retirement Planning Tools
        description: >-
          Online calculators for life insurance needs, retirement income,
          college savings, 401(k) projections, and withdrawal strategy planning.
  - type: UseCases
    data:
      - name: Agent/Producer Integration
        description: >-
          Independent agents and financial service representatives access
          product information, submit applications, and manage policies
          through the financial professionals portal.
      - name: Institutional Distribution
        description: >-
          Banks, broker-dealers, and financial institutions distribute W&S
          annuity and life insurance products through wholesale partnership
          agreements.
      - name: Retirement Income Planning
        description: >-
          Advisors and clients use online tools and product solutions to
          build retirement income strategies using annuities and managed accounts.
      - name: Digital Life Insurance
        description: >-
          Consumers purchase and manage term life insurance and estate planning
          documents digitally through the Fabric by Gerber Life mobile platform.
  - type: Integrations
    data:
      - name: DTCC Insurance & Retirement Services
        description: >-
          Integration with DTCC's insurance and retirement services platform
          for producer authorization, annuity processing, and lifecycle
          management using ACORD standards.
      - name: ACORD Standards
        description: >-
          Life and annuity data standards compliance using ACORD Next-Generation
          Digital Standards (NGDS) including JSON and YAML-based exchange
          formats for insurance transactions.
      - name: Fidelity Institutional
        description: >-
          Product distribution partnership with Fidelity for annuity and
          insurance product offerings through Fidelity's advisor platform.
