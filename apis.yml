aid: western-and-southern-financial-group
name: Western & Southern Financial Group
url: https://raw.githubusercontent.com/api-evangelist/western-and-southern-financial-group/refs/heads/main/apis.yml
modified: '2026-05-03'
description: >-
  Western & Southern Financial Group is a Fortune 500 diversified family of
  financial services companies headquartered in Cincinnati, Ohio. Founded in
  1888, the group offers life insurance, annuities, mutual funds, asset
  management, retirement planning, and investment management through a family
  of subsidiaries including Western & Southern Life, Columbus Life, Gerber Life,
  Integrity Life, Lafayette Life, Fort Washington Investment Advisors, Touchstone
  Investments, and W&S Financial Group Distributors, with over $112 billion in
  assets under management.
